apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-api
  namespace: admin-api
  labels: {app: admin-api}
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector: {matchLabels: {app: admin-api}}
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  template:
    metadata:
      labels: {app: admin-api}
    spec:
      containers:
        - name: admin-api
          image: trivip002/admin-api:7e79cd8
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: admin-api-secret
                  key: JWT_SECRET
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: admin-api-secret
                  key: MONGODB_URI
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: admin-api-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: admin-api-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              value: "https://www.devapihub.com/api/login/oauth2/code/google"
            - name: FRONTEND_REDIRECT_URI
              value: "https://devshop.it.com/oauth2/callback"
            - name: JWT_EXPIRATION_MS
              value: "86400000"
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits: {memory: "1Gi"}
          readinessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Nếu app khởi động chậm, startupProbe cho 150s “ân hạn”
          startupProbe:
            httpGet:
              path: /api/actuator/health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
